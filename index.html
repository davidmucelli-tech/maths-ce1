<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathoPlanet CE1 🚀</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0d28;--purple:#7c3aed;--pink:#db2777;--yellow:#fbbf24;
  --cyan:#22d3ee;--green:#34d399;--red:#f87171;--orange:#fb923c;
  --card:rgba(255,255,255,.07);--border:rgba(255,255,255,.13);
  --text:#f0f4ff;--muted:rgba(240,244,255,.45);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);font-family:'Baloo 2',cursive;color:var(--text);min-height:100vh;overflow-x:hidden}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0}
.star{position:absolute;border-radius:50%;background:#fff;animation:tw var(--d) ease-in-out infinite alternate}
@keyframes tw{from{opacity:.08;transform:scale(.6)}to{opacity:.9;transform:scale(1.4)}}
.planet{position:fixed;border-radius:50%;pointer-events:none;z-index:0}
.p1{width:220px;height:220px;top:-80px;right:-70px;background:radial-gradient(circle at 33% 33%,#a78bfa,#3b0764);opacity:.5}
.p2{width:140px;height:140px;bottom:30px;left:-50px;background:radial-gradient(circle at 33% 33%,#f9a8d4,#831843);opacity:.45}
.wrap{position:relative;z-index:1;max-width:880px;margin:0 auto;padding:20px 16px 60px}
header{text-align:center;padding:22px 0 12px}
.logo{font-size:2.2rem;font-weight:800}
.logo .rocket{display:inline-block;animation:bob 2s ease-in-out infinite alternate}
@keyframes bob{from{transform:translateY(0)rotate(-8deg)}to{transform:translateY(-8px)rotate(8deg)}}
.logo .hl{color:var(--yellow)}
.sub{font-family:'Nunito',sans-serif;font-size:.84rem;color:var(--muted);margin-top:3px}
.tabs{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:14px 0 0}
.tab{padding:6px 15px;border-radius:999px;border:2px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:var(--muted);cursor:pointer;font-family:'Baloo 2',cursive;font-size:.86rem;font-weight:700;transition:.18s;user-select:none}
.tab:hover:not(.active){border-color:rgba(255,255,255,.28);color:var(--text)}
.tab.active{border-color:transparent;color:#0d0d28}
.tab[data-cat=melange].active{background:#e879f9;color:#fff}
.tab[data-cat=addition].active{background:var(--green)}
.tab[data-cat=soustraction].active{background:var(--cyan)}
.tab[data-cat=multiplication].active{background:var(--pink);color:#fff}
.tab[data-cat=numeration].active{background:var(--yellow)}
.tab[data-cat=geometrie].active{background:#a78bfa}
.tab[data-cat=mesures].active{background:var(--orange)}
.tab[data-cat=problemes].active{background:#38bdf8}
.settings{display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:11px 16px;margin:13px 0}
.sg{display:flex;align-items:center;gap:7px}
.slabel{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;white-space:nowrap}
.pills{display:flex;gap:4px}
.pill{padding:4px 11px;border-radius:999px;border:1.5px solid rgba(255,255,255,.16);background:transparent;color:var(--muted);cursor:pointer;font-family:'Baloo 2',cursive;font-size:.78rem;font-weight:700;transition:.16s}
.pill.on{background:var(--purple);border-color:var(--purple);color:#fff}
.pill:hover:not(.on){border-color:rgba(255,255,255,.38);color:var(--text)}
.screen{display:none}
.sec-hd{margin-bottom:12px}
.sec-hd h2{font-size:1.05rem;font-weight:800}
.sec-hd p{font-size:.77rem;color:var(--muted);margin-top:2px}
.exgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:11px}
.excard{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:17px 13px 13px;cursor:pointer;transition:.2s;text-align:center;position:relative;overflow:hidden}
.excard::before{content:'';position:absolute;inset:0;background:linear-gradient(140deg,rgba(255,255,255,.05),transparent)}
.excard:hover{transform:translateY(-4px);border-color:rgba(255,255,255,.28);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.excard .ico{font-size:2.1rem;display:block;margin-bottom:6px}
.excard .nm{font-size:.9rem;font-weight:800;line-height:1.3}
.excard .ds{font-size:.72rem;color:var(--muted);margin-top:3px;line-height:1.4}
.excard .record{font-size:.68rem;color:var(--yellow);margin-top:5px;font-weight:700}
.badge{display:inline-block;margin-top:7px;font-size:.65rem;padding:2px 9px;border-radius:999px;font-weight:800;text-transform:uppercase;letter-spacing:.5px}
.badge.facile{background:rgba(52,211,153,.18);color:var(--green)}
.badge.moyen{background:rgba(251,191,36,.18);color:var(--yellow)}
.badge.difficile{background:rgba(248,113,113,.18);color:var(--red)}
/* PLAY */
.play-hd{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.play-title{font-size:1rem;font-weight:800}
.pmeta{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.scorebox{background:rgba(255,255,255,.08);border-radius:10px;padding:5px 12px;font-size:.8rem;font-weight:700}
.scorebox span{color:var(--yellow)}
.timerbox{background:rgba(251,191,36,.11);border:1.5px solid rgba(251,191,36,.32);border-radius:10px;padding:5px 12px;font-size:.82rem;font-weight:700;color:var(--yellow);display:none;align-items:center;gap:4px}
.timerbox.urgent{background:rgba(248,113,113,.18);border-color:var(--red);color:var(--red);animation:urg .45s ease infinite alternate}
@keyframes urg{from{transform:scale(1)}to{transform:scale(1.07)}}
.streak-bar{display:flex;align-items:center;gap:8px;margin-bottom:10px;min-height:26px}
.streak-badge{background:linear-gradient(135deg,var(--orange),var(--yellow));color:#0d0d28;border-radius:999px;padding:3px 13px;font-size:.8rem;font-weight:800;animation:sp .3s ease}
@keyframes sp{from{transform:scale(.7)}to{transform:scale(1)}}
.mult-badge{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;border-radius:999px;padding:3px 11px;font-size:.76rem;font-weight:800}
.progwrap{margin-bottom:14px}
.progbg{background:rgba(255,255,255,.08);border-radius:6px;height:7px;overflow:hidden}
.progbar{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--purple),var(--pink));transition:width .35s ease}
.proglbl{font-size:.68rem;color:var(--muted);margin-top:3px;text-align:right}
/* QUESTION CARD */
.qcard{background:var(--card);border:1.5px solid var(--border);border-radius:22px;padding:28px 20px 22px;text-align:center;position:relative;overflow:hidden;min-height:260px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.qcard::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(124,58,237,.2),transparent 55%);pointer-events:none}
.qlabel{font-size:.67rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);position:relative}
.qtext{font-size:2rem;font-weight:800;line-height:1.3;white-space:pre-line;position:relative}
.qtext.sm{font-size:1.3rem}
.wrong-hint{font-size:.85rem;color:var(--red);font-weight:700;position:relative;animation:fi .3s ease}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1}}
/* INPUT */
.arow{display:flex;align-items:center;justify-content:center;gap:9px;flex-wrap:wrap;position:relative}
.ainp{width:110px;padding:9px 12px;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.16);border-radius:12px;color:#fff;font-family:'Baloo 2',cursive;font-size:1.55rem;font-weight:800;text-align:center;outline:none;transition:border-color .16s;-moz-appearance:textfield}
.ainp::-webkit-outer-spin-button,.ainp::-webkit-inner-spin-button{-webkit-appearance:none}
.ainp:focus{border-color:var(--purple)}
.ainp.ok{border-color:var(--green);background:rgba(52,211,153,.1)}
.ainp.ko{border-color:var(--red);background:rgba(248,113,113,.1);animation:shk .3s ease}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.ainp-label{font-size:.7rem;color:var(--muted);text-align:center;margin-top:2px}
/* MCQ */
.mcqgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;width:100%;max-width:360px;position:relative}
.mcqbtn{padding:13px 8px;border-radius:13px;border:2px solid rgba(255,255,255,.16);background:rgba(255,255,255,.05);color:#fff;font-family:'Baloo 2',cursive;font-size:1.3rem;font-weight:800;cursor:pointer;transition:.17s}
.mcqbtn:hover:not(:disabled){border-color:var(--purple);background:rgba(124,58,237,.25);transform:scale(1.03)}
.mcqbtn.ok{border-color:var(--green)!important;background:rgba(52,211,153,.2)!important}
.mcqbtn.ko{border-color:var(--red)!important;background:rgba(248,113,113,.16)!important}
.mcqbtn:disabled{cursor:default}
.mcqbtn.sm{font-size:.88rem;padding:11px 7px}
.vbtn{margin-top:11px;padding:11px 32px;background:linear-gradient(135deg,var(--purple),var(--pink));border:none;border-radius:999px;color:#fff;font-family:'Baloo 2',cursive;font-size:.93rem;font-weight:800;cursor:pointer;box-shadow:0 4px 16px rgba(124,58,237,.4);transition:transform .13s,box-shadow .13s;position:relative}
.vbtn:hover{transform:translateY(-2px);box-shadow:0 7px 22px rgba(124,58,237,.5)}
.vbtn:disabled{opacity:.35;cursor:default;transform:none!important}
.backbtn{background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.12);border-radius:999px;padding:5px 14px;color:var(--muted);cursor:pointer;font-family:'Baloo 2',cursive;font-size:.78rem;font-weight:700;transition:.16s}
.backbtn:hover{background:rgba(255,255,255,.15);color:var(--text)}
/* CLOCK SVG */
.clock-wrap{position:relative;margin:4px auto 0}
/* MULTI-INPUT for decompose */
.multi-inp-row{display:flex;gap:14px;align-items:flex-end;justify-content:center;flex-wrap:wrap}
.inp-group{display:flex;flex-direction:column;align-items:center;gap:4px}
/* FEEDBACK */
#fb{position:fixed;inset:0;pointer-events:none;z-index:500;display:flex;align-items:center;justify-content:center}
.fbmsg{font-size:4.5rem;font-weight:800;animation:fba .65s ease forwards}
@keyframes fba{0%{opacity:1;transform:scale(.35)}45%{transform:scale(1.3);opacity:1}80%{opacity:1}100%{opacity:0;transform:scale(1.5)translateY(-55px)}}
.bonus-pop{position:fixed;pointer-events:none;z-index:501;font-size:1.4rem;font-weight:800;color:var(--yellow);text-shadow:0 2px 8px rgba(0,0,0,.5);animation:bp .9s ease forwards}
@keyframes bp{0%{opacity:1;transform:translateY(0)scale(.8)}60%{opacity:1;transform:translateY(-50px)scale(1.1)}100%{opacity:0;transform:translateY(-90px)scale(.9)}}
/* RESULTS */
#results-screen{text-align:center;padding:32px 16px}
.remoji{font-size:3.6rem;display:block;margin-bottom:8px}
.rtitle{font-size:1.8rem;font-weight:800;margin-bottom:4px}
.rsub{color:var(--muted);margin-bottom:20px;font-size:.88rem}
.record-banner{background:linear-gradient(135deg,rgba(251,191,36,.2),rgba(251,191,36,.05));border:1.5px solid rgba(251,191,36,.4);border-radius:14px;padding:10px 22px;margin-bottom:18px;font-size:.95rem;font-weight:800;color:var(--yellow);display:none}
.rboxes{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:16px}
.rbox{display:flex;flex-direction:column;align-items:center;background:var(--card);border:1.5px solid var(--border);border-radius:18px;padding:18px 28px;gap:2px}
.rbig{font-size:2.8rem;font-weight:800;color:var(--yellow);line-height:1}
.rlbl{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.rtime{font-size:.83rem;color:var(--muted);margin-bottom:14px}
.starsrow{display:flex;justify-content:center;gap:5px;margin-bottom:22px;font-size:1.9rem}
.rbtns{display:flex;gap:9px;justify-content:center;flex-wrap:wrap}
.rbtn{padding:11px 26px;border-radius:999px;border:none;font-family:'Baloo 2',cursive;font-size:.9rem;font-weight:800;cursor:pointer;transition:transform .13s}
.rbtn.p{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;box-shadow:0 4px 16px rgba(124,58,237,.38)}
.rbtn.p:hover{transform:translateY(-2px)}
.rbtn.s{background:rgba(255,255,255,.08);color:var(--muted);border:1.5px solid rgba(255,255,255,.12)}
.rbtn.s:hover{background:rgba(255,255,255,.14);color:var(--text)}
/* GEO SHAPES */
.geo-shape{margin:4px auto 0;display:block}
/* CONFETTI */
.cf{position:fixed;pointer-events:none;z-index:999;animation:cf var(--d) ease-out var(--dl) both}
@keyframes cf{0%{transform:translateY(-20px)rotate(0);opacity:1}100%{transform:translateY(105vh)rotate(800deg);opacity:0}}
@media(max-width:500px){.qtext{font-size:1.6rem}.exgrid{grid-template-columns:repeat(auto-fill,minmax(145px,1fr))}.logo{font-size:1.85rem}.rboxes{gap:8px}.rbox{padding:14px 18px}}
</style>
</head>
<body>
<div id="stars"></div>
<div class="planet p1"></div>
<div class="planet p2"></div>
<div id="fb"></div>
<div class="wrap">
  <header>
    <div class="logo"><span class="rocket">🚀</span> Matho<span class="hl">Planet</span> <span style="font-size:1rem;font-weight:600;color:var(--muted)">CE1</span></div>
    <div class="sub">Jeu de maths interactif · Calcul mental &amp; Numération</div>
  </header>
  <div class="tabs" id="tabs">
    <div class="tab active" data-cat="melange">🎲 Tout mélangé</div>
    <div class="tab" data-cat="addition">➕ Addition</div>
    <div class="tab" data-cat="soustraction">➖ Soustraction</div>
    <div class="tab" data-cat="multiplication">✖️ Multiplication</div>
    <div class="tab" data-cat="numeration">🔢 Numération</div>
    <div class="tab" data-cat="geometrie">📐 Géométrie</div>
    <div class="tab" data-cat="mesures">📏 Mesures</div>
    <div class="tab" data-cat="problemes">🧩 Problèmes</div>
  </div>
  <div class="settings">
    <div class="sg">
      <span class="slabel">Difficulté</span>
      <div class="pills" id="dpills">
        <button class="pill on" data-v="facile">⭐ Facile</button>
        <button class="pill" data-v="moyen">⭐⭐ Moyen</button>
        <button class="pill" data-v="difficile">⭐⭐⭐ Difficile</button>
      </div>
    </div>
    <div class="sg">
      <span class="slabel">Questions</span>
      <div class="pills" id="npills">
        <button class="pill on" data-v="10">10</button>
        <button class="pill" data-v="20">20</button>
      </div>
    </div>
    <div class="sg">
      <span class="slabel">Chrono</span>
      <div class="pills" id="tpills">
        <button class="pill on" data-v="0">Off</button>
        <button class="pill" data-v="60">1 min</button>
        <button class="pill" data-v="120">2 min</button>
        <button class="pill" data-v="180">3 min</button>
      </div>
    </div>
  </div>
  <!-- MENU -->
  <div id="menu-screen" class="screen">
    <div class="sec-hd"><h2 id="cat-title"></h2><p id="cat-desc"></p></div>
    <div class="exgrid" id="exgrid"></div>
  </div>
  <!-- PLAY -->
  <div id="play-screen" class="screen">
    <div class="play-hd">
      <button class="backbtn" id="backbtn">← Retour</button>
      <div class="play-title" id="ptitle"></div>
      <div class="pmeta">
        <div class="scorebox">Score&nbsp;: <span id="scoreVal">0</span></div>
        <div class="timerbox" id="timerbox">⏱ <span id="timerVal">0:00</span></div>
      </div>
    </div>
    <div class="streak-bar" id="streakBar"></div>
    <div class="progwrap">
      <div class="progbg"><div class="progbar" id="progbar" style="width:0%"></div></div>
      <div class="proglbl" id="proglbl"></div>
    </div>
    <div class="qcard" id="qcard"></div>
  </div>
  <!-- RESULTS -->
  <div id="results-screen" class="screen">
    <span class="remoji" id="remoji"></span>
    <div class="rtitle" id="rtitle"></div>
    <div class="rsub" id="rsub"></div>
    <div class="record-banner" id="recordBanner"></div>
    <div class="rboxes">
      <div class="rbox"><div class="rbig" id="rbig"></div><div class="rlbl">bonnes réponses</div></div>
      <div class="rbox"><div class="rbig" id="rpoints" style="color:var(--cyan)"></div><div class="rlbl">points</div></div>
      <div class="rbox" id="rboxRec" style="display:none"><div class="rbig" style="font-size:1.8rem" id="rrecord"></div><div class="rlbl">meilleur score</div></div>
    </div>
    <div class="rtime" id="rtime"></div>
    <div class="starsrow" id="starsrow"></div>
    <div class="rbtns">
      <button class="rbtn p" id="btnReplay">🔄 Rejouer</button>
      <button class="rbtn s" id="btnMenu">🏠 Menu</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════
const R=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const P=arr=>arr[R(0,arr.length-1)];
const SH=arr=>[...arr].sort(()=>Math.random()-.5);
const el=(tag,cls,txt)=>{const e=document.createElement(tag);if(cls)e.className=cls;if(txt!==undefined)e.textContent=txt;return e;};

// Dedup questions: generate nb unique questions from a gen function
function genUnique(genFn,diff,nb){
  const qs=[],seen=new Set();
  let tries=0;
  while(qs.length<nb&&tries++<nb*30){
    try{
      const q=genFn(diff);
      if(!q||!q.q||q.ans===undefined||!q.type)continue;
      const key=q.q.replace(/\s/g,'');
      if(seen.has(key))continue;
      seen.add(key);qs.push(q);
    }catch(e){}
  }
  // pad if not enough unique
  while(qs.length<nb){qs.push(qs[R(0,Math.max(0,qs.length-1))]||{q:'2+2=?',ans:4,type:'input'});}
  return qs;
}

// ══════════════════════════════════════════════
// AUDIO
// ══════════════════════════════════════════════
let _ctx=null;
function aC(){if(!_ctx)_ctx=new(window.AudioContext||window.webkitAudioContext)();return _ctx;}
function playOk(){try{const c=aC();[[0,523],[.1,659],[.2,784]].forEach(([t,f])=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.18,c.currentTime+t);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+t+.25);o.start(c.currentTime+t);o.stop(c.currentTime+t+.3);});}catch(e){}}
function playKo(){try{const c=aC(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sawtooth';o.frequency.setValueAtTime(220,c.currentTime);o.frequency.exponentialRampToValueAtTime(110,c.currentTime+.18);g.gain.setValueAtTime(.12,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.22);o.start(c.currentTime);o.stop(c.currentTime+.25);}catch(e){}}
function playRec(){try{const c=aC();[[0,523],[.08,659],[.16,784],[.24,1047],[.36,1319]].forEach(([t,f])=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.15,c.currentTime+t);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+t+.22);o.start(c.currentTime+t);o.stop(c.currentTime+t+.25);});}catch(e){}}

// ══════════════════════════════════════════════
// RECORDS
// ══════════════════════════════════════════════
const recKey=(id,d)=>`mp_${id}_${d}`;
const getRec=(id,d)=>{const v=localStorage.getItem(recKey(id,d));return v!==null?parseInt(v):null;};
const setRec=(id,d,v)=>localStorage.setItem(recKey(id,d),v);

// ══════════════════════════════════════════════
// CLOCK SVG
// ══════════════════════════════════════════════
function clockSVG(h,m){
  const size=130;const cx=size/2,cy=size/2,r=cx-6;
  const angleMins=(m/60)*360-90;
  const angleHours=((h%12)/12)*360+(m/60)*30-90;
  const toXY=(deg,len)=>{const rad=deg*Math.PI/180;return{x:cx+Math.cos(rad)*len,y:cy+Math.sin(rad)*len};};
  const hpt=toXY(angleHours,r*.52);
  const mpt=toXY(angleMins,r*.72);
  const ticks=Array.from({length:12},(_,i)=>{
    const a=(i/12)*360-90,inner=toXY(a,r*.82),outer=toXY(a,r);
    return `<line x1="${inner.x}" y1="${inner.y}" x2="${outer.x}" y2="${outer.y}" stroke="rgba(240,244,255,.5)" stroke-width="${i%3===0?2.5:1.2}"/>`;
  }).join('');
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" class="geo-shape">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.25)" stroke-width="2.5"/>
    ${ticks}
    <line x1="${cx}" y1="${cy}" x2="${hpt.x}" y2="${hpt.y}" stroke="#f0f4ff" stroke-width="4" stroke-linecap="round"/>

function shapeSVG(name){
  const s=110,c=s/2,col='rgba(167,139,250,.8)',str='rgba(167,139,250,1)';
  const shapes={
    'triangle':`<polygon points="${c},12 ${s-10},${s-12} 10,${s-12}" fill="${col}" stroke="${str}" stroke-width="2.5" stroke-linejoin="round"/>`,
    'carré':`<rect x="12" y="12" width="${s-24}" height="${s-24}" fill="${col}" stroke="${str}" stroke-width="2.5" rx="2"/>`,
    'rectangle':`<rect x="8" y="22" width="${s-16}" height="${s-44}" fill="${col}" stroke="${str}" stroke-width="2.5" rx="2"/>`,
    'cercle':`<circle cx="${c}" cy="${c}" r="${c-12}" fill="${col}" stroke="${str}" stroke-width="2.5"/>`,
    'losange':`<polygon points="${c},10 ${s-10},${c} ${c},${s-10} 10,${c}" fill="${col}" stroke="${str}" stroke-width="2.5" stroke-linejoin="round"/>`,
    'pentagone':`<polygon points="${c},10 ${s-12},36 ${s-18},${s-12} 18,${s-12} 12,36" fill="${col}" stroke="${str}" stroke-width="2.5" stroke-linejoin="round"/>`,
    'hexagone':`<polygon points="${c},8 ${s-14},26 ${s-14},${s-26} ${c},${s-8} 14,${s-26} 14,26" fill="${col}" stroke="${str}" stroke-width="2.5" stroke-linejoin="round"/>`,
    'octogone':`<polygon points="34,10 76,10 100,34 100,76 76,100 34,100 10,76 10,34" fill="${col}" stroke="${str}" stroke-width="2.5" stroke-linejoin="round"/>`,
    'triangle rectangle':`<polygon points="15,${s-15} ${s-15},${s-15} 15,15" fill="${col}" stroke="${str}" stroke-width="2.5" stroke-linejoin="round"/>`,
    'triangle équilatéral':`<polygon points="${c},12 ${s-10},${s-12} 10,${s-12}" fill="${col}" stroke="${str}" stroke-width="2.5" stroke-linejoin="round"/>`,
    'cube':`<polygon points="30,70 30,30 65,10 100,30 100,70 65,90" fill="${col}" stroke="${str}" stroke-width="2"/>
      <polyline points="30,30 65,50 100,30" fill="none" stroke="${str}" stroke-width="2"/>
      <line x1="65" y1="50" x2="65" y2="90" stroke="${str}" stroke-width="2"/>`,
    'pavé droit':`<polygon points="20,75 20,35 55,15 95,25 95,65 60,85" fill="${col}" stroke="${str}" stroke-width="2"/>
      <polyline points="20,35 60,45 95,25" fill="none" stroke="${str}" stroke-width="2"/>
      <line x1="60" y1="45" x2="60" y2="85" stroke="${str}" stroke-width="2"/>`,
    'pyramide':`<polygon points="${c},10 10,${s-15} ${s-10},${s-15}" fill="${col}" stroke="${str}" stroke-width="2.5"/>
      <line x1="${c}" y1="10" x2="${c}" y2="${s-15}" stroke="${str}" stroke-width="1.5" stroke-dasharray="4,3"/>`,
    'tétraèdre':`<polygon points="${c},8 8,${s-12} ${s-8},${s-12}" fill="${col}" stroke="${str}" stroke-width="2.5"/>
      <line x1="${c}" y1="${s-12}" x2="${c}" y2="8" stroke="${str}" stroke-width="1.5"/>`,
    'demi-droite':`<defs><marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="${str}"/></marker></defs>
      <circle cx="18" cy="${c}" r="4" fill="${str}"/>
      <line x1="18" y1="${c}" x2="${s-14}" y2="${c}" stroke="${str}" stroke-width="2.5" marker-end="url(#arr)"/>`,
    'droite':`<defs><marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="${str}"/></marker>
      <marker id="arr3" markerWidth="8" markerHeight="8" refX="0" refY="3" orient="auto"><path d="M6,0 L0,3 L6,6 Z" fill="${str}"/></marker></defs>
      <line x1="12" y1="${c}" x2="${s-12}" y2="${c}" stroke="${str}" stroke-width="2.5" marker-end="url(#arr2)" marker-start="url(#arr3)"/>`,
    'segment':`<circle cx="18" cy="${c}" r="4" fill="${str}"/>
      <circle cx="${s-18}" cy="${c}" r="4" fill="${str}"/>
      <line x1="18" y1="${c}" x2="${s-18}" y2="${c}" stroke="${str}" stroke-width="2.5"/>`,
  };
  const svg=shapes[name]||shapes['carré'];
  return `<svg width="${s}" height="${s}" viewBox="0 0 ${s} ${s}" class="geo-shape">${svg}</svg>`;
}

// ── Table helper ───────────────────────
function mkT(t,d){
  const max=d==='facile'?5:d==='moyen'?7:10;const a=R(1,max);
  const v=R(0,3);
  if(v===1)return{q:`${a} × ${t} = ?`,ans:t*a,type:d==='facile'?'mcq':'input'};
  if(v===2&&d!=='facile')return{q:`? × ${t} = ${t*a}`,ans:a,type:'input'};
  if(v===3&&d!=='facile')return{q:`${t} × ? = ${t*a}`,ans:a,type:'input'};
  return{q:`${t} × ${a} = ?`,ans:t*a,type:d==='facile'?'mcq':'input'};
}

      ()=>{const sh=P([{n:'carré',r:true},{n:'rectangle',r:true},{n:'triangle rectangle',r:true},{n:'triangle équilatéral',r:false},{n:'losange',r:false},{n:'hexagone régulier',r:false}]);return{q:`Le ${sh.n} a-t-il des angles droits ?`,ans:sh.r?'Oui':'Non',type:'mcq_yn',choices:['Oui','Non'],shape:sh.n};},
      ()=>{const sym='AHIMOTUVWXY'.split(''),asym='BCDFGKLNPQRSZ'.split('');const l=P([...sym,...asym]);return{q:`La lettre "${l}" a-t-elle un axe de symétrie ?`,ans:sym.includes(l)?'Oui':'Non',type:'mcq_yn',choices:['Oui','Non'],shape:null};},
      ()=>{const sh=P([{n:'cube',f:6},{n:'pavé droit',f:6},{n:'pyramide',f:5},{n:'tétraèdre',f:4}]);return{q:`Combien de faces a un ${sh.n} ?`,ans:sh.f,type:'mcq',shape:sh.n};},
      ()=>{const items=[{q:'Un segment a-t-il deux extrémités ?',ans:'Oui',sh:'segment'},{q:'Une droite a-t-elle un début et une fin ?',ans:'Non',sh:'droite'},{q:'Une demi-droite a-t-elle un point de départ ?',ans:'Oui',sh:'demi-droite'},{q:'Deux droites parallèles se croisent-elles ?',ans:'Non',sh:null},{q:'Un carré est-il aussi un rectangle ?',ans:'Oui',sh:'carré'},{q:'Un rectangle est-il toujours un carré ?',ans:'Non',sh:'rectangle'}];const it=P(items);return{q:it.q,ans:it.ans,type:'mcq_yn',choices:['Oui','Non'],shape:it.sh};},
    ],
  };
  return P(pools[d]??pools.moyen)();
}

// ── Mesures generator ─────────────────
function mesureGen(d,kind){

    ];

    ()=>{const a=R(1,9)*10;return{q:`${a} cm = ? dm`,ans:a/10,type:'input'};},
    ()=>{const a=R(1,9);return{q:`${a} m = ? cm`,ans:a*100,type:'input'};},
    ()=>{const a=R(1,9)*100;return{q:`${a} cm = ? m`,ans:a/100,type:'input'};},
    ()=>{const a=R(1,5),b=R(1,9);return{q:`${a} m ${b*10} cm = ? cm en tout`,ans:a*100+b*10,type:'input'};},
    ()=>{const a=R(1,5);return{q:`${a} kg = ? g`,ans:a*1000,type:'input'};},
    ()=>{const a=R(1,5)*1000;return{q:`${a} g = ? kg`,ans:a/1000,type:'input'};},
    ()=>{const a=R(1,9)*100;return{q:`${a} g = ? kg`,ans:a/1000,type:'input'};},
    ()=>{const a=R(1,5),b=R(1,9)*100;return{q:`${a} kg ${b} g = ? g en tout`,ans:a*1000+b,type:'input'};},
    ()=>{const pairs=[[5,'mm',50,'cm'],[2,'dm',20,'cm'],[3,'m',300,'cm']];const[va,ua,vb,ub]=P(pairs);return{q:`Lequel est le plus grand :\n${va} ${ua}  ou  ${vb} ${ub} ?`,ans:`${vb} ${ub}`,type:'mcq',choices:[`${va} ${ua}`,`${vb} ${ub}`,'Égaux']};},
  ];

// ── Clock generator ───────────────────
function clockGen(d){
  const h=R(1,12);
  const mins=d==='facile'?[0]:d==='moyen'?[0,30]:P([[0,15,30,45],[0,5,10,15,20,25,30,35,40,45,50,55]]);
  const m=P(Array.isArray(mins)?mins:[mins]);
  const labels={0:'pile',5:'cinq',10:'dix',15:'et quart',20:'vingt',25:'vingt-cinq',30:'et demie',35:'trente-cinq',40:'quarante',45:'moins le quart',50:'cinquante',55:'cinquante-cinq'};
  const good=m===0?`${h} heures`:`${h} heures ${labels[m]||m}`;
  const fakeH=h===12?1:h+1;
  const wrongs=[
    m===0?`${h} heures et demie`:`${h} heures pile`,
    `${fakeH} heures`,
    m===30?`${h} heures et quart`:`${h} heures et demie`,
  ];
  return{q:`Quelle heure est-il ?`,ans:good,type:'mcq',choices:SH([good,...wrongs.slice(0,3)]),clock:{h,m}};
}

  ];
  const med=[
    {q:'3 semaines = ? jours',ans:21,type:'input'},
    {q:'4 semaines = ? jours',ans:28,type:'input'},
    {q:'Combien de secondes dans une minute ?',ans:60,type:'mcq'},
    {q:'Combien de semaines environ dans un mois ?',ans:4,type:'mcq'},
    {q:'Quel est le 6ème mois de l\'année ?',ans:'juin',type:'mcq',choices:SH(['juin','mai','juillet','août'])},
    {q:'Quel jour vient avant vendredi ?',ans:'jeudi',type:'mcq',choices:SH(['jeudi','mercredi','samedi','lundi'])},
    ()=>{const s=R(2,8);return{q:`${s} semaines = ? jours`,ans:s*7,type:'input'};},
    ()=>{const h=R(2,6);return{q:`${h} heures = ? minutes`,ans:h*60,type:'input'};},
  ];
  const hard=[
    {q:'Une année = ? jours',ans:365,type:'input'},
    {q:'2 ans = ? mois',ans:24,type:'input'},
    {q:'Une demi-heure = ? minutes',ans:30,type:'input'},
    {q:'1 h 30 min = ? minutes en tout',ans:90,type:'input'},
    {q:'Combien de trimestres dans une année ?',ans:4,type:'mcq'},
    {q:'Combien de semaines dans une année (environ) ?',ans:52,type:'input'},

// ── Money generator ───────────────────
function moneyGen(d){
  const items=[
    ()=>{const p=P(d==='facile'?[0.5,1,2]:d==='moyen'?[1.5,2.5,3,4,5]:[6.5,7,8.5,9,10]);const don=d==='facile'?2:d==='moyen'?5:10;if(p>=don)return moneyGen(d);const r=Math.round((don-p)*100)/100;return{q:`Un jouet coûte ${p.toLocaleString('fr')} €.\nTu donnes un billet de ${don} €.\nCombien récupères-tu ?`,ans:r,type:'input'};},
    ()=>{const a=P(d==='facile'?[0.5,1,1.5,2]:d==='moyen'?[1,2,3,4,5]:[5,6,7,8,9]),b=P(d==='facile'?[0.5,1,2]:d==='moyen'?[1,2,3]:[3,4,5]);return{q:`Marie achète un stylo à ${a.toLocaleString('fr')} €\net un cahier à ${b.toLocaleString('fr')} €.\nCombien dépense-t-elle en tout ?`,ans:Math.round((a+b)*100)/100,type:'input'};},
    ()=>{const tot=P(d==='facile'?[3,4,5]:d==='moyen'?[5,8,10]:[10,15,20]),dep=P(d==='facile'?[1,2]:d==='moyen'?[2,3,4]:[4,6,8]);if(dep>=tot)return moneyGen(d);return{q:`Paul a ${tot} €. Il achète un livre à ${dep} €.\nCombien lui reste-t-il ?`,ans:tot-dep,type:'input'};},
  ];
  return P(items)();
}

// START GAME
// ══════════════════════════════════════════════
function startGame(ex){
  S.ex=ex;
  // For mélange, each question comes from a random exercise
  if(ex.id==='melange'){
    const allEx=Object.values(CAT).flat();
    S.qs=genUnique(d=>{const e=P(allEx);return e.gen(d);},S.diff,S.nb);
  } else {
    S.qs=genUnique(ex.gen.bind(ex),S.diff,S.nb);
  }
  S.cur=0;S.score=0;S.points=0;S.streak=0;S.mult=1;S.done=false;
  show('play-screen');
  document.getElementById('ptitle').textContent=`${ex.ico} ${ex.nm}`;
  document.getElementById('streakBar').innerHTML='';
  stopTimer();
  const tb=document.getElementById('timerbox');
  if(S.timerDur>0){
    S.timeLeft=S.timerDur;
    tb.style.display='flex';tb.classList.remove('urgent');
    updateTimerDisp();
    S.startT=Date.now();
    S.timerInt=setInterval(tickDown,200);
  } else {
    tb.style.display='none';S.timeLeft=0;
  }
  showQ();
}

function tickDown(){
  S.timeLeft=Math.max(0,S.timerDur-(Date.now()-S.startT)/1000);
  updateTimerDisp();
  document.getElementById('timerbox').classList.toggle('urgent',S.timeLeft<=15);
  if(S.timeLeft<=0){stopTimer();endByTime();}
}
function updateTimerDisp(){const sec=Math.ceil(S.timeLeft);document.getElementById('timerVal').textContent=`${Math.floor(sec/60)}:${String(sec%60).padStart(2,'0')}`;}
function stopTimer(){if(S.timerInt){clearInterval(S.timerInt);S.timerInt=null;}}
function endByTime(){
  // If a question is currently shown but not answered, show "time's up" then results
  S.cur=S.qs.length; // force end
  const card=document.getElementById('qcard');
  if(card){
    card.innerHTML='';
    const msg=el('div','qtext','⏰ Temps écoulé !');
    msg.style.fontSize='1.6rem';card.appendChild(msg);
  }
  setTimeout(()=>showResults(),1200);
}

function showQ(){
  if(S.cur>=S.qs.length){showResults();return;}
  S.done=false;
  const q=S.qs[S.cur],tot=S.qs.length;
  document.getElementById('progbar').style.width=`${(S.cur/tot)*100}%`;
  document.getElementById('proglbl').textContent=`Question ${S.cur+1} / ${tot}`;
  document.getElementById('scoreVal').textContent=S.points;
  renderStreak();
  const card=document.getElementById('qcard');card.innerHTML='';
  card.appendChild(el('div','qlabel',`Question ${S.cur+1}`));

  // Clock visual
  if(q.clock){
    const wrap=document.createElement('div');wrap.innerHTML=clockSVG(q.clock.h,q.clock.m);card.appendChild(wrap);
  }
  // Geo shape visual
  if(q.shape){
    const wrap=document.createElement('div');wrap.innerHTML=shapeSVG(q.shape);card.appendChild(wrap);
  }

  const txt=el('div','qtext',q.q);
  if(q.q&&q.q.length>50)txt.classList.add('sm');
  card.appendChild(txt);

  if(q.type==='input')buildInput(card,q);
  else if(q.type==='text_input')buildTextInput(card,q);
  else if(q.type==='mcq'||q.type==='mcq_yn')buildMCQ(card,q);
  else if(q.type==='decompose')buildDecompose(card,q);
}

function renderStreak(){
  const bar=document.getElementById('streakBar');bar.innerHTML='';
  if(S.streak>=3){const sb=el('div','streak-badge',`🔥 ${S.streak} d'affilée !`);bar.appendChild(sb);}
  if(S.mult>1){const mb=el('div','mult-badge',`×${S.mult} points`);bar.appendChild(mb);}
}

// ── INPUT ───────────────────────────────
function buildInput(card,q){
  const row=el('div','arow');
  const inp=document.createElement('input');
  inp.type='text';inp.inputMode='numeric';inp.pattern='[0-9.]*';
  inp.className='ainp';inp.placeholder='?';inp.autocomplete='off';
  const btn=el('button','vbtn','Valider ✓');
  row.appendChild(inp);row.appendChild(btn);card.appendChild(row);
  requestAnimationFrame(()=>inp.focus());
  const go=()=>{
    if(S.done)return;
    const raw=inp.value.replace(',','.').trim();
    const val=parseFloat(raw);
    if(raw===''||isNaN(val)){inp.focus();return;}
    S.done=true;
    const ok=Math.abs(val-q.ans)<0.001;
    inp.classList.add(ok?'ok':'ko');btn.disabled=true;
    if(!ok){const h=el('div','wrong-hint',`✗ La réponse était ${q.ans}`);card.appendChild(h);}
    onAnswer(ok);
  };
  btn.addEventListener('click',go);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')go();});
}

// ── TEXT INPUT (lire et écrire) ─────────
function buildTextInput(card,q){
  const row=el('div','arow');
  const inp=document.createElement('input');
  inp.type='text';inp.className='ainp';inp.style.width='220px';inp.style.fontSize='1rem';
  inp.placeholder='En lettres…';inp.autocomplete='off';inp.spellcheck=false;
  const btn=el('button','vbtn','Valider ✓');
  row.appendChild(inp);row.appendChild(btn);card.appendChild(row);
  requestAnimationFrame(()=>inp.focus());
  const normalize=s=>s.trim().toLowerCase().replace(/[-–—]/g,'-').replace(/\s+/g,' ');
  const go=()=>{
    if(S.done)return;
    const raw=inp.value;
    if(!raw.trim()){inp.focus();return;}
    S.done=true;
    const ok=normalize(raw)===normalize(String(q.ans));
    inp.classList.add(ok?'ok':'ko');btn.disabled=true;
    if(!ok){const h=el('div','wrong-hint',`✗ La réponse était : ${q.ans}`);card.appendChild(h);}
    onAnswer(ok);
  };
  btn.addEventListener('click',go);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')go();});
}

// ── MCQ ─────────────────────────────────
function buildMCQ(card,q){
  // For yes/no: always Oui left, Non right
  let choices;
  if(q.type==='mcq_yn'){
    choices=['Oui','Non'];
  } else {
    const raw=q.choices?[...new Set(q.choices)]:makeChoices(q.ans);
    choices=SH(raw);
  }
  const isText=choices.some(c=>typeof c==='string'&&isNaN(Number(c)));
  const grid=el('div','mcqgrid');
  choices.forEach(c=>{
    const btn=el('button','mcqbtn'+(isText?' sm':''),c);
    btn.addEventListener('click',()=>{
      if(S.done)return;S.done=true;
      const ok=String(c)===String(q.ans);
      btn.classList.add(ok?'ok':'ko');
      if(!ok)grid.querySelectorAll('.mcqbtn').forEach(b=>{if(String(b.textContent)===String(q.ans))b.classList.add('ok');});
      grid.querySelectorAll('.mcqbtn').forEach(b=>b.disabled=true);
      onAnswer(ok);
    });
    grid.appendChild(btn);
  });
  card.appendChild(grid);
}

// ── DECOMPOSE ───────────────────────────
function buildDecompose(card,q){
  const{ans,hide,n}=q;
  const hasCentaines=n>=100;
  const row=el('div','multi-inp-row');
  const inputs={};
  const fields=hasCentaines?['c','d','u']:['d','u'];
  const labels={c:'centaines',d:'dizaines',u:'unités'};
  const allVals={c:ans.c,d:ans.d,u:ans.u};

  fields.forEach(f=>{
    const grp=el('div','inp-group');
    if(hide.includes(f)){
      const inp=document.createElement('input');
      inp.type='text';inp.inputMode='numeric';inp.className='ainp';
      inp.style.width='80px';inp.style.fontSize='1.2rem';inp.placeholder='?';inp.autocomplete='off';
      inputs[f]=inp;
      grp.appendChild(inp);
    } else {
      const val=el('div','qtext',String(allVals[f]));val.style.fontSize='1.6rem';grp.appendChild(val);
    }
    grp.appendChild(el('div','ainp-label',labels[f]));
    row.appendChild(grp);
  });

  card.appendChild(row);

  const btn=el('button','vbtn','Valider ✓');
  card.appendChild(btn);

  const firstInp=Object.values(inputs)[0];
  if(firstInp)requestAnimationFrame(()=>firstInp.focus());

  const go=()=>{
    if(S.done)return;
    let allOk=true;
    for(const f of hide){
      const inp=inputs[f];
      if(!inp)continue;
      const v=parseInt(inp.value.trim());
      if(isNaN(v)){inp.focus();return;}
      const ok=v===allVals[f];
      inp.classList.remove('ok','ko');inp.classList.add(ok?'ok':'ko');
      if(!ok)allOk=false;
    }
    S.done=true;btn.disabled=true;
    if(!allOk){
      const parts=fields.map(f=>`${allVals[f]} ${labels[f]}`);
      const h=el('div','wrong-hint',`✗ ${n} = ${parts.join(', ')}`);card.appendChild(h);
    }
    onAnswer(allOk);
  };
  btn.addEventListener('click',go);
  Object.values(inputs).forEach(inp=>inp.addEventListener('keydown',e=>{if(e.key==='Enter')go();}));
}

function makeChoices(ans){
  const set=new Set([ans]);let tries=0;
  while(set.size<4&&tries++<80){const v=ans+P([-5,-4,-3,-2,-1,1,2,3,4,5])*(Math.random()<.5?1:2);if(v>=0)set.add(v);}
  return[...set];
}

// ══════════════════════════════════════════════
// ANSWER
// ══════════════════════════════════════════════
function onAnswer(ok){
  if(ok){
    S.score++;S.streak++;
    if(S.streak>=10)S.mult=4;else if(S.streak>=6)S.mult=3;else if(S.streak>=3)S.mult=2;else S.mult=1;
    let pts=10*S.mult;
    if(S.timerDur>0&&S.timeLeft>0){const bonus=Math.round((S.timeLeft/S.timerDur)*5);pts+=bonus;}
    S.points+=pts;
    showBonusPop(`+${pts}`+(S.mult>1?` ×${S.mult}`:''));
    playOk();
  } else {
    S.streak=0;S.mult=1;
    playKo();
  }
  const fb=document.getElementById('fb');fb.innerHTML='';
  const m=el('div','fbmsg',ok?P(['⭐','🎉','✨','🔥','💫','🌟']):'😢');
  fb.appendChild(m);
  setTimeout(()=>{S.cur++;if(S.cur>=S.qs.length)showResults();else showQ();},1000);
}

function showBonusPop(text){
  const e=el('div','bonus-pop',text);
  e.style.cssText=`top:42%;left:${R(28,62)}%;`;
  document.body.appendChild(e);
  setTimeout(()=>e.remove(),1000);
}

// ══════════════════════════════════════════════
// RESULTS
// ══════════════════════════════════════════════
function showResults(){
  stopTimer();show('results-screen');
  const pct=S.score/S.qs.length;
  document.getElementById('remoji').textContent=pct===1?'🏆':pct>=.8?'🌟':pct>=.6?'😊':'💪';
  document.getElementById('rtitle').textContent=pct===1?'Parfait !':pct>=.8?'Excellent !':pct>=.6?'Bien joué !':'Continue !';
  document.getElementById('rsub').textContent=pct===1?'Tout bon, champion(ne) !':pct>=.8?'Presque parfait !':pct>=.6?'Bon travail !':'Tu vas progresser !';
  document.getElementById('rbig').textContent=`${S.score}/${S.qs.length}`;
  document.getElementById('rpoints').textContent=S.points;
  if(S.timerDur>0){const used=S.timerDur-Math.max(0,S.timeLeft);const sec=Math.floor(used);document.getElementById('rtime').textContent=`⏱ Temps utilisé : ${Math.floor(sec/60)}min ${sec%60}s`;}
  else document.getElementById('rtime').textContent='';
  const rec=getRec(S.ex.id,S.diff);
  const isNew=rec===null||S.points>rec;
  if(isNew)setRec(S.ex.id,S.diff,S.points);
  const banner=document.getElementById('recordBanner');
  banner.style.display=isNew?'block':'none';
  if(isNew){banner.textContent=rec===null?'🏆 Premier score enregistré !':'🏆 Nouveau record !';playRec();launchConfetti();}
  const rboxRec=document.getElementById('rboxRec');
  rboxRec.style.display='flex';
  document.getElementById('rrecord').textContent=`${isNew?S.points:rec} pts`;
  const stars=pct===1?3:pct>=.6?2:1;
  document.getElementById('starsrow').innerHTML=[0,1,2].map(i=>`<span style="opacity:${i<stars?1:.15}">${i<stars?'⭐':'☆'}</span>`).join('');
  if(!isNew&&pct>=.8)launchConfetti();
}

// ══════════════════════════════════════════════
// CONFETTI
// ══════════════════════════════════════════════
function launchConfetti(){
  const cols=['#fbbf24','#34d399','#22d3ee','#db2777','#a78bfa','#fb923c','#fff'];
  for(let i=0;i<80;i++){const e=el('div','cf');const sz=R(5,13);e.style.cssText=`left:${R(2,98)}%;top:0;background:${P(cols)};width:${sz}px;height:${sz}px;border-radius:${Math.random()<.5?'50%':'2px'};--d:${R(1400,3000)}ms;--dl:${R(0,800)}ms`;document.body.appendChild(e);setTimeout(()=>e.remove(),3800);}
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
window.addEventListener('DOMContentLoaded',()=>{show('menu-screen');renderMenu();});
</script>
