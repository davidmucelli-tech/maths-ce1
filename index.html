<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathoPlanet CE1 🚀</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0d28;--purple:#7c3aed;--pink:#db2777;--yellow:#fbbf24;
  --cyan:#22d3ee;--green:#34d399;--red:#f87171;--orange:#fb923c;
  --card:rgba(255,255,255,.07);--border:rgba(255,255,255,.13);
  --text:#f0f4ff;--muted:rgba(240,244,255,.45);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);font-family:'Baloo 2',cursive;color:var(--text);min-height:100vh;overflow-x:hidden}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0}
.star{position:absolute;border-radius:50%;background:#fff;animation:tw var(--d) ease-in-out infinite alternate}
@keyframes tw{from{opacity:.08;transform:scale(.6)}to{opacity:.9;transform:scale(1.4)}}
.planet{position:fixed;border-radius:50%;pointer-events:none;z-index:0}
.p1{width:220px;height:220px;top:-80px;right:-70px;background:radial-gradient(circle at 33% 33%,#a78bfa,#3b0764);opacity:.5}
.p2{width:140px;height:140px;bottom:30px;left:-50px;background:radial-gradient(circle at 33% 33%,#f9a8d4,#831843);opacity:.45}
.wrap{position:relative;z-index:1;max-width:880px;margin:0 auto;padding:20px 16px 60px}
header{text-align:center;padding:22px 0 12px}
.logo{font-size:2.2rem;font-weight:800}
.rocket{display:inline-block;animation:bob 2s ease-in-out infinite alternate}
@keyframes bob{from{transform:translateY(0)rotate(-8deg)}to{transform:translateY(-8px)rotate(8deg)}}
.hl{color:var(--yellow)}
.sub{font-family:'Nunito',sans-serif;font-size:.84rem;color:var(--muted);margin-top:3px}

/* TABS */
.tabs{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:14px 0 0}
.tab{padding:6px 16px;border-radius:999px;border:2px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:var(--muted);cursor:pointer;font-family:'Baloo 2',cursive;font-size:.86rem;font-weight:700;transition:.18s;user-select:none}
.tab:hover:not(.active){border-color:rgba(255,255,255,.28);color:var(--text)}
.tab.active{border-color:transparent;color:#0d0d28}
.tab[data-cat=calculs].active{background:var(--green)}
.tab[data-cat=numeration].active{background:var(--yellow)}
.tab[data-cat=geometrie].active{background:#a78bfa}
.tab[data-cat=mesures].active{background:var(--orange)}
.tab[data-cat=problemes].active{background:#38bdf8}

/* SETTINGS */
.settings{display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:11px 16px;margin:13px 0}
.sg{display:flex;align-items:center;gap:7px}
.slabel{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;white-space:nowrap}
.pills{display:flex;gap:4px}
.pill{padding:4px 12px;border-radius:999px;border:1.5px solid rgba(255,255,255,.16);background:transparent;color:var(--muted);cursor:pointer;font-family:'Baloo 2',cursive;font-size:.78rem;font-weight:700;transition:.16s}
.pill.on{background:var(--purple);border-color:var(--purple);color:#fff}
.pill:hover:not(.on){border-color:rgba(255,255,255,.38);color:var(--text)}

/* SCREENS */
.screen{display:none}

/* MENU */
.sec-hd{margin-bottom:12px}
.sec-hd h2{font-size:1.05rem;font-weight:800}
.sec-hd p{font-size:.77rem;color:var(--muted);margin-top:2px}
.exgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:11px}
.excard{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:17px 13px 13px;cursor:pointer;transition:.2s;text-align:center;position:relative;overflow:hidden}
.excard::before{content:'';position:absolute;inset:0;background:linear-gradient(140deg,rgba(255,255,255,.05),transparent)}
.excard:hover{transform:translateY(-4px);border-color:rgba(255,255,255,.28);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.excard .ico{font-size:2.1rem;display:block;margin-bottom:6px}
.excard .nm{font-size:.9rem;font-weight:800;line-height:1.3}
.excard .ds{font-size:.72rem;color:var(--muted);margin-top:3px;line-height:1.4}
.excard .rec{font-size:.68rem;color:var(--yellow);margin-top:5px;font-weight:700}

/* PLAY */
.play-hd{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.play-title{font-size:1rem;font-weight:800}
.pmeta{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.scorebox{background:rgba(255,255,255,.08);border-radius:10px;padding:5px 12px;font-size:.8rem;font-weight:700}
.scorebox span{color:var(--yellow)}
.timerbox{background:rgba(251,191,36,.11);border:1.5px solid rgba(251,191,36,.32);border-radius:10px;padding:5px 12px;font-size:.82rem;font-weight:700;color:var(--yellow);align-items:center;gap:4px}
.timerbox.urgent{background:rgba(248,113,113,.18);border-color:var(--red);color:var(--red);animation:urg .45s ease infinite alternate}
@keyframes urg{from{transform:scale(1)}to{transform:scale(1.07)}}
.streak-bar{display:flex;align-items:center;gap:8px;margin-bottom:10px;min-height:26px}
.streak-badge{background:linear-gradient(135deg,var(--orange),var(--yellow));color:#0d0d28;border-radius:999px;padding:3px 13px;font-size:.8rem;font-weight:800;animation:sp .3s ease}
@keyframes sp{from{transform:scale(.7)}to{transform:scale(1)}}
.mult-badge{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;border-radius:999px;padding:3px 11px;font-size:.76rem;font-weight:800}
.progwrap{margin-bottom:14px}
.progbg{background:rgba(255,255,255,.08);border-radius:6px;height:7px;overflow:hidden}
.progbar{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--purple),var(--pink));transition:width .35s ease}
.proglbl{font-size:.68rem;color:var(--muted);margin-top:3px;text-align:right}
/* Per-question countdown bar */
.qtimer-wrap{width:100%;max-width:400px;position:relative}
.qtimer-bg{background:rgba(255,255,255,.08);border-radius:6px;height:8px;overflow:hidden}
.qtimer-bar{height:100%;border-radius:6px;background:var(--green);transition:none}
.qtimer-bar.warn{background:var(--yellow)}
.qtimer-bar.danger{background:var(--red)}
.qtimer-lbl{font-size:.72rem;font-weight:800;text-align:center;margin-top:3px;color:var(--muted)}
.qtimer-lbl.warn{color:var(--yellow)}
.qtimer-lbl.danger{color:var(--red)}

/* QUESTION CARD */
.qcard{background:var(--card);border:1.5px solid var(--border);border-radius:22px;padding:28px 20px 22px;text-align:center;position:relative;overflow:hidden;min-height:280px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.qcard::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(124,58,237,.2),transparent 55%);pointer-events:none}
.qlabel{font-size:.67rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);position:relative}
.qtext{font-size:2rem;font-weight:800;line-height:1.3;white-space:pre-line;position:relative}
.qtext.sm{font-size:1.2rem}
.wrong-hint{font-size:.85rem;color:var(--red);font-weight:700;position:relative;animation:fi .3s ease;margin-top:4px}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1}}

/* MCQ — bigger, child-friendly */
.mcqgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;width:100%;max-width:400px;position:relative}
.mcqbtn{padding:16px 10px;border-radius:16px;border:2px solid rgba(255,255,255,.16);background:rgba(255,255,255,.06);color:#fff;font-family:'Baloo 2',cursive;font-size:1.5rem;font-weight:800;cursor:pointer;transition:.17s;line-height:1.2}
.mcqbtn:hover:not(:disabled){border-color:var(--purple);background:rgba(124,58,237,.25);transform:scale(1.04)}
.mcqbtn.ok{border-color:var(--green)!important;background:rgba(52,211,153,.22)!important}
.mcqbtn.ko{border-color:var(--red)!important;background:rgba(248,113,113,.16)!important}
.mcqbtn:disabled{cursor:default}
.mcqbtn.sm{font-size:.95rem;padding:14px 8px}

.backbtn{background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.12);border-radius:999px;padding:5px 14px;color:var(--muted);cursor:pointer;font-family:'Baloo 2',cursive;font-size:.78rem;font-weight:700;transition:.16s}
.backbtn:hover{background:rgba(255,255,255,.15);color:var(--text)}

/* GEO / CLOCK shapes */
.geo-shape{display:block;margin:0 auto}

/* FEEDBACK */
#fb{position:fixed;inset:0;pointer-events:none;z-index:500;display:flex;align-items:center;justify-content:center}
.fbmsg{font-size:5rem;animation:fba .65s ease forwards}
@keyframes fba{0%{opacity:1;transform:scale(.35)}45%{transform:scale(1.3);opacity:1}80%{opacity:1}100%{opacity:0;transform:scale(1.5)translateY(-55px)}}
.bonus-pop{position:fixed;pointer-events:none;z-index:501;font-size:1.4rem;font-weight:800;color:var(--yellow);text-shadow:0 2px 8px rgba(0,0,0,.5);animation:bp .9s ease forwards}
@keyframes bp{0%{opacity:1;transform:translateY(0)scale(.8)}60%{opacity:1;transform:translateY(-50px)scale(1.1)}100%{opacity:0;transform:translateY(-90px)scale(.9)}}

/* RESULTS */
#results-screen{text-align:center;padding:32px 16px}
.remoji{font-size:3.6rem;display:block;margin-bottom:8px}
.rtitle{font-size:1.8rem;font-weight:800;margin-bottom:4px}
.rsub{color:var(--muted);margin-bottom:20px;font-size:.88rem}
.record-banner{background:linear-gradient(135deg,rgba(251,191,36,.2),rgba(251,191,36,.05));border:1.5px solid rgba(251,191,36,.4);border-radius:14px;padding:10px 22px;margin-bottom:18px;font-size:.95rem;font-weight:800;color:var(--yellow);display:none}
.rboxes{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:16px}
.rbox{display:flex;flex-direction:column;align-items:center;background:var(--card);border:1.5px solid var(--border);border-radius:18px;padding:18px 28px;gap:2px}
.rbig{font-size:2.8rem;font-weight:800;color:var(--yellow);line-height:1}
.rlbl{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.rtime{font-size:.83rem;color:var(--muted);margin-bottom:14px}
.starsrow{display:flex;justify-content:center;gap:5px;margin-bottom:22px;font-size:1.9rem}
.rbtns{display:flex;gap:9px;justify-content:center;flex-wrap:wrap}
.rbtn{padding:11px 26px;border-radius:999px;border:none;font-family:'Baloo 2',cursive;font-size:.9rem;font-weight:800;cursor:pointer;transition:transform .13s}
.rbtn.p{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;box-shadow:0 4px 16px rgba(124,58,237,.38)}
.rbtn.p:hover{transform:translateY(-2px)}
.rbtn.s{background:rgba(255,255,255,.08);color:var(--muted);border:1.5px solid rgba(255,255,255,.12)}
.rbtn.s:hover{background:rgba(255,255,255,.14);color:var(--text)}
.cf{position:fixed;pointer-events:none;z-index:999;animation:cf var(--d) ease-out var(--dl) both}
@keyframes cf{0%{transform:translateY(-20px)rotate(0);opacity:1}100%{transform:translateY(105vh)rotate(800deg);opacity:0}}

@media(max-width:500px){
  .qtext{font-size:1.6rem}.exgrid{grid-template-columns:repeat(auto-fill,minmax(145px,1fr))}
  .logo{font-size:1.85rem}.mcqbtn{font-size:1.2rem;padding:12px 7px}
}
</style>
</head>
<body>
<div id="stars"></div>
<div class="planet p1"></div>
<div class="planet p2"></div>
<div id="fb"></div>

<div class="wrap">
  <header>
    <div class="logo"><span class="rocket">🚀</span> Matho<span class="hl">Planet</span> <span style="font-size:1rem;font-weight:600;color:var(--muted)">CE1</span></div>
    <div class="sub">Jeu de maths interactif · Calcul mental &amp; Numération</div>
  </header>

  <div class="tabs" id="tabs">
    <div class="tab active" data-cat="calculs">🔢 Calculs</div>
    <div class="tab" data-cat="numeration">🔡 Numération</div>
    <div class="tab" data-cat="geometrie">📐 Géométrie</div>
    <div class="tab" data-cat="mesures">📏 Mesures</div>
    <div class="tab" data-cat="problemes">🧩 Problèmes</div>
  </div>

  <div class="settings">
    <div class="sg">
      <span class="slabel">Questions</span>
      <div class="pills" id="npills">
        <button class="pill on" data-v="10">10</button>
        <button class="pill" data-v="20">20</button>
        <button class="pill" data-v="0">∞ Infini</button>
      </div>
    </div>
    <div class="sg">
      <span class="slabel">Vitesse</span>
      <div class="pills" id="tpills">
        <button class="pill on" data-v="0">🐢 Off</button>
        <button class="pill" data-v="15">🚶 Normal</button>
        <button class="pill" data-v="10">🏃 Rapide</button>
        <button class="pill" data-v="7">⚡ Génie</button>
      </div>
    </div>
  </div>

  <div id="menu-screen" class="screen">
    <div class="sec-hd"><h2 id="cat-title"></h2><p id="cat-desc"></p></div>
    <div class="exgrid" id="exgrid"></div>
  </div>

  <div id="play-screen" class="screen">
    <div class="play-hd">
      <button class="backbtn" id="backbtn">← Retour</button>
      <div class="play-title" id="ptitle"></div>
      <div class="pmeta">
        <div class="scorebox">Score : <span id="scoreVal">0</span></div>
        <div class="timerbox" id="timerbox" style="display:none">⏱ <span id="timerVal">0:00</span></div>
      </div>
    </div>
    <div class="streak-bar" id="streakBar"></div>
    <div class="progwrap">
      <div class="progbg"><div class="progbar" id="progbar" style="width:0%"></div></div>
      <div class="proglbl" id="proglbl"></div>
    </div>
    <div class="qtimer-wrap" id="qtimerWrap" style="display:none">
      <div class="qtimer-bg"><div class="qtimer-bar" id="qtimerBar" style="width:100%"></div></div>
      <div class="qtimer-lbl" id="qtimerLbl"></div>
    </div>
    <div class="qcard" id="qcard"></div>
  </div>

  <div id="results-screen" class="screen">
    <span class="remoji" id="remoji"></span>
    <div class="rtitle" id="rtitle"></div>
    <div class="rsub"   id="rsub"></div>
    <div class="record-banner" id="recordBanner"></div>
    <div class="rboxes">
      <div class="rbox"><div class="rbig" id="rbig"></div><div class="rlbl">bonnes réponses</div></div>
      <div class="rbox"><div class="rbig" id="rpoints" style="color:var(--cyan)"></div><div class="rlbl">points</div></div>
      <div class="rbox" id="rboxRec" style="display:none"><div class="rbig" style="font-size:1.8rem" id="rrecord"></div><div class="rlbl">meilleur score</div></div>
    </div>
    <div class="rtime" id="rtime"></div>
    <div class="starsrow" id="starsrow"></div>
    <div class="rbtns">
      <button class="rbtn p" id="btnReplay">🔄 Rejouer</button>
      <button class="rbtn s" id="btnMenu">🏠 Menu</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════
// UTILS
// ════════════════════════════════════════
const R  = (a,b) => Math.floor(Math.random()*(b-a+1))+a;
const P  = arr  => arr[R(0,arr.length-1)];
const SH = arr  => [...arr].sort(()=>Math.random()-.5);
const mk = (tag,cls,txt) => { const e=document.createElement(tag); if(cls)e.className=cls; if(txt!==undefined)e.textContent=txt; return e; };

// Generate MCQ choices around a numeric answer
function numChoices(ans, n=4) {
  const set = new Set([ans]);
  let tries = 0;
  while (set.size < n && tries++ < 100) {
    const delta = P([1,2,3,4,5,6,10]) * (Math.random()<.5?1:-1);
    const v = ans + delta;
    if (v >= 0 && v !== ans) set.add(v);
  }
  return SH([...set]);
}

// ════════════════════════════════════════
// AUDIO
// ════════════════════════════════════════
let _ctx = null;
const aC = () => { if(!_ctx) _ctx=new(window.AudioContext||window.webkitAudioContext)(); return _ctx; };
function playOk() {
  try { const c=aC(); [[0,523],[.1,659],[.2,784]].forEach(([t,f])=>{ const o=c.createOscillator(),g=c.createGain(); o.connect(g);g.connect(c.destination); o.frequency.value=f; g.gain.setValueAtTime(.18,c.currentTime+t); g.gain.exponentialRampToValueAtTime(.001,c.currentTime+t+.25); o.start(c.currentTime+t);o.stop(c.currentTime+t+.3); }); } catch(e){}
}
function playKo() {
  try { const c=aC(),o=c.createOscillator(),g=c.createGain(); o.connect(g);g.connect(c.destination); o.type='sawtooth'; o.frequency.setValueAtTime(220,c.currentTime); o.frequency.exponentialRampToValueAtTime(110,c.currentTime+.18); g.gain.setValueAtTime(.12,c.currentTime); g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.22); o.start(c.currentTime);o.stop(c.currentTime+.25); } catch(e){}
}
function playRec() {
  try { const c=aC(); [[0,523],[.08,659],[.16,784],[.24,1047],[.36,1319]].forEach(([t,f])=>{ const o=c.createOscillator(),g=c.createGain(); o.connect(g);g.connect(c.destination); o.frequency.value=f; g.gain.setValueAtTime(.15,c.currentTime+t); g.gain.exponentialRampToValueAtTime(.001,c.currentTime+t+.22); o.start(c.currentTime+t);o.stop(c.currentTime+t+.25); }); } catch(e){}
}

// ════════════════════════════════════════
// RECORDS (localStorage, no difficulty key)
// ════════════════════════════════════════
const recKey = id => `mpc_${id}`;
const getRec = id => { const v=localStorage.getItem(recKey(id)); return v!==null?parseInt(v):null; };
const setRec = (id,v) => localStorage.setItem(recKey(id),v);

// ════════════════════════════════════════
// CLOCK SVG
// ════════════════════════════════════════
function clockSVG(h, m) {
  const sz=130, cx=sz/2, cy=sz/2, r=cx-6;
  const toXY = (deg,len) => { const rad=deg*Math.PI/180; return {x:cx+Math.cos(rad)*len, y:cy+Math.sin(rad)*len}; };
  const aDeg = -90; // 0° = 3 o'clock in SVG; -90 offset so 0 = 12 o'clock
  const mAngle = (m/60)*360 + aDeg;
  const hAngle = ((h%12)/12)*360 + (m/60)*30 + aDeg;
  const mp = toXY(mAngle, r*.72);
  const hp = toXY(hAngle, r*.52);
  const ticks = Array.from({length:12},(_,i)=>{
    const a=(i/12)*360+aDeg, inn=toXY(a,r*.82), out=toXY(a,r);
    return `<line x1="${inn.x}" y1="${inn.y}" x2="${out.x}" y2="${out.y}" stroke="rgba(240,244,255,.5)" stroke-width="${i%3===0?2.5:1.2}"/>`;
  }).join('');
  // Hour numbers for easier reading
  const nums = Array.from({length:12},(_,i)=>{
    const n=i+1, a=(n/12)*360+aDeg, pt=toXY(a,r*.62);
    return `<text x="${pt.x}" y="${pt.y}" text-anchor="middle" dominant-baseline="central" fill="rgba(240,244,255,.55)" font-size="9" font-family="sans-serif">${n}</text>`;
  }).join('');
  return `<svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}" class="geo-shape">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.25)" stroke-width="2.5"/>
    ${ticks}${nums}
    <line x1="${cx}" y1="${cy}" x2="${hp.x}" y2="${hp.y}" stroke="#f0f4ff" stroke-width="4" stroke-linecap="round"/>
    <line x1="${cx}" y1="${cy}" x2="${mp.x}" y2="${mp.y}" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="${cx}" cy="${cy}" r="4" fill="#fbbf24"/>
  </svg>`;
}

// ════════════════════════════════════════
// GEO SHAPE SVG
// ════════════════════════════════════════
function shapeSVG(name) {
  const s=110,c=s/2,col='rgba(167,139,250,.8)',str='rgba(167,139,250,1)';
  const shapes={
    'triangle':`<polygon points="${c},12 ${s-10},${s-12} 10,${s-12}" fill="${col}" stroke="${str}" stroke-width="2.5" stroke-linejoin="round"/>`,
    'carré':`<rect x="12" y="12" width="${s-24}" height="${s-24}" fill="${col}" stroke="${str}" stroke-width="2.5" rx="2"/>`,
    'rectangle':`<rect x="8" y="25" width="${s-16}" height="${s-50}" fill="${col}" stroke="${str}" stroke-width="2.5" rx="2"/>`,
    'cercle':`<circle cx="${c}" cy="${c}" r="${c-12}" fill="${col}" stroke="${str}" stroke-width="2.5"/>`,
    'losange':`<polygon points="${c},10 ${s-10},${c} ${c},${s-10} 10,${c}" fill="${col}" stroke="${str}" stroke-width="2.5" stroke-linejoin="round"/>`,
    'pentagone':`<polygon points="${c},10 ${s-12},36 ${s-18},${s-12} 18,${s-12} 12,36" fill="${col}" stroke="${str}" stroke-width="2.5" stroke-linejoin="round"/>`,
    'hexagone':`<polygon points="${c},8 ${s-14},26 ${s-14},${s-26} ${c},${s-8} 14,${s-26} 14,26" fill="${col}" stroke="${str}" stroke-width="2.5" stroke-linejoin="round"/>`,

// — Helper: wrap numeric answer in mcq
function wrapMCQ(q, ans, choicesFn) {
  return { ...q, ans, type:'mcq', choices: choicesFn ? choicesFn(ans) : numChoices(ans) };
}
// Choices for unit conversions: nearby powers of 10
function unitChoices(ans) {
  const pows = [0.001,0.01,0.1,1,10,100,1000,10000];
  const set = new Set([ans]);
  // Add adjacent powers of 10 that differ from ans
  pows.forEach(p=>{ if(p!==ans) set.add(p); });
  // Also add ans*10, ans/10 etc.
  [ans*10, ans/10, ans*100, ans/100, ans*1000, ans/1000].forEach(v=>{
    if(v>0 && v!==ans) set.add(v);
  });
  // Pick 3 wrong from set, prefer values that look plausible (not too huge/tiny)
  const wrong = [...set].filter(v=>v!==ans && v>0 && v<=100000)
    .sort((a,b)=>Math.abs(Math.log10(a)-Math.log10(ans))-Math.abs(Math.log10(b)-Math.log10(ans)));
  return SH([ans, ...wrong.slice(0,3)]);
}
// Choices for money questions
function moneyChoices(ans) {
  const set = new Set([ans]);
  const deltas = [1,2,5,10,0.5,0.1];
  deltas.forEach(d=>{ const v=Math.round((ans+d)*100)/100; if(v>0&&v!==ans)set.add(v); deltas.forEach(dd=>{ const u=Math.round((ans-dd)*100)/100; if(u>0&&u!==ans)set.add(u); }); });
  const arr=[...set].filter(v=>v>0&&v!==ans);
  return SH([ans,...arr.slice(0,3)]);
}

          'dix','onze','douze','treize','quatorze','quinze','seize','dix-sept','dix-huit','dix-neuf'];

        ()=>{ const p=P([0.10,0.20,0.50]),nb=R(3,9); return wrapMCQ({q:`${nb} pièces de ${(p*100).toFixed(0)}c\n= ? centimes en tout`}, Math.round(nb*p*100), mc); },
        // Equivalences
        ()=> ({q:`2 pièces de 50 centimes\n= combien d'euros ?`, ans:1, type:'mcq', choices:SH([1,2,0.5,0.25])}),
        ()=> ({q:`1 billet de 20 €\n= combien de billets de 10 € ?`, ans:2, type:'mcq', choices:SH([2,4,1,5])}),
        ()=>{ const nb=P([2,3,4,5]); return wrapMCQ({q:`${nb} billets de 10 €\n= ? € en tout`}, nb*10, mc); },
        ()=>{ const nb=P([2,3,4]); return wrapMCQ({q:`${nb} billets de 20 €\n= ? € en tout`}, nb*20, mc); },
        // Comparer des prix
        ()=>{ const a=P([8,12,15,18]),b=P([9,11,14,20]); const diff=Math.abs(a-b); return wrapMCQ({q:`Un crayon coûte ${Math.max(a,b)} €,\nun autre ${Math.min(a,b)} €.\nQuelle est la différence ?`}, diff, mc); },
      ])();
    }
  },
];

// ─── PROBLÈMES ──────────────────────────
const problemesExercises = [
  { id:'p_achat', ico:'🛒', nm:'Achats', ds:'Addition et soustraction concrètes',
    gen() {
      return P([
        ()=>{ const a=R(5,40),b=R(2,a-1); return wrapMCQ({q:`Léa a ${a} billes. Elle en gagne ${b}.\nCombien en a-t-elle en tout ?`}, a+b); },
        ()=>{ const t=R(10,50),b=R(2,t-1); return wrapMCQ({q:`Théo avait ${t} bonbons. Il en mange ${b}.\nCombien lui en reste-t-il ?`}, t-b); },
        ()=>{ const a=R(2,20),b=R(2,20); return wrapMCQ({q:`Un livre coûte ${a} €, un stylo ${b} €.\nCombien coûtent-ils ensemble ?`}, a+b); },
      ])();
    }
  },
  { id:'p_groupe', ico:'📚', nm:'Groupes d\'objets', ds:'Multiplier pour trouver un total',
    gen() {
      const t=P([2,3,4,5,6,10]); const a=R(2,9);
      return wrapMCQ({q:`Il y a ${a} boîtes.\nChaque boîte contient ${t} crayons.\nCombien y a-t-il de crayons ?`}, a*t);
    }
  },
  { id:'p_mesure', ico:'🏃', nm:'Longueurs et distances', ds:'Additionner ou comparer des mesures',
    gen() {
      const a=R(10,80),b=R(10,80);
      return R(0,1)===0
        ? wrapMCQ({q:`Un ruban mesure ${a} cm.\nUn autre mesure ${b} cm.\nLongueur totale ?`}, a+b)
        : wrapMCQ({q:`Un chemin mesure ${Math.max(a,b)} cm.\nUn autre mesure ${Math.min(a,b)} cm.\nDifférence ?`}, Math.abs(a-b));
    }
  },
  { id:'p_partage', ico:'🎒', nm:'Partage équitable', ds:'Répartir en groupes égaux',
    gen() {
      const t=P([2,3,4,5,10]); const n=R(2,9)*t;
      return wrapMCQ({q:`On répartit ${n} élèves en groupes de ${t}.\nCombien y a-t-il de groupes ?`}, n/t);
    }
  },
  { id:'p_2etapes', ico:'❓', nm:'Deux étapes', ds:'Enchaîner deux opérations',
    gen() {
      const a=R(10,40),b=R(2,a-2),c=R(2,12);
      return wrapMCQ({q:`Inès a ${a} images.\nElle en donne ${b} à son frère,\npuis elle en reçoit ${c} de sa cousine.\nCombien en a-t-elle maintenant ?`}, a-b+c);
    }
  },
];

// ════════════════════════════════════════
// CATALOGUE MAP
// ════════════════════════════════════════
const CAT = {
  calculs:    calculsExercises,
  numeration: numerationExercises,
  geometrie:  geometrieExercises,
  mesures:    mesuresExercises,
  problemes:  problemesExercises,
};

const META = {
  calculs:    {t:'Calculs 🔢', d:'Addition, soustraction, tables de multiplication, division…'},
  numeration: {t:'Numération 🔡', d:'Comparer, lire, écrire, avant/après, suites, décomposer…'},
  geometrie:  {t:'Géométrie 📐', d:'Formes, angles droits, symétrie, solides, lignes…'},
  mesures:    {t:'Mesures 📏', d:'Conversions d\'unités, lecture de l\'heure, calendrier, monnaie…'},
  problemes:  {t:'Problèmes 🧩', d:'Achats, groupes, mesures, partages, deux étapes…'},
};

// ════════════════════════════════════════
// STATE
// ════════════════════════════════════════
const S = { cat:'calculs', nb:10, perQSec:0, // 0=off, 15/10/7 = normal/rapide/génie
  ex:null, qs:[], cur:0, score:0, points:0, streak:0, mult:1,
  startT:null, timerInt:null, timeLeft:0, done:false };

// ════════════════════════════════════════
// STARS
// ════════════════════════════════════════
(function(){ const c=document.getElementById('stars'); for(let i=0;i<130;i++){ const e=document.createElement('div'); e.className='star'; const sz=R(1,3); e.style.cssText=`width:${sz}px;height:${sz}px;top:${R(0,100)}%;left:${R(0,100)}%;--d:${R(2,6)}s;animation-delay:-${R(0,5000)}ms`; c.appendChild(e); } })();

// ════════════════════════════════════════
// SCREEN SWITCHER
// ════════════════════════════════════════
function show(id) {
  ['menu-screen','play-screen','results-screen'].forEach(s =>
    document.getElementById(s).style.display = s===id ? 'block' : 'none'
  );
}

// ════════════════════════════════════════
// TABS & PILLS
// ════════════════════════════════════════
document.getElementById('tabs').addEventListener('click', e => {
  const t=e.target.closest('.tab'); if(!t) return;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active'); S.cat=t.dataset.cat; goMenu();
});
function bindPills(id, cb) {
  document.getElementById(id).addEventListener('click', e => {
    const p=e.target.closest('.pill'); if(!p) return;
    document.querySelectorAll(`#${id} .pill`).forEach(x=>x.classList.remove('on'));
    p.classList.add('on'); cb(p.dataset.v);
  });
}
bindPills('npills', v => S.nb=parseInt(v));
bindPills('tpills', v => S.perQSec=parseInt(v));
document.getElementById('backbtn').addEventListener('click', goMenu);
document.getElementById('btnReplay').addEventListener('click', ()=>startGame(S.ex));
document.getElementById('btnMenu').addEventListener('click', goMenu);

// ════════════════════════════════════════
// MENU
// ════════════════════════════════════════
function goMenu() { stopTimer(); show('menu-screen'); renderMenu(); }

function renderMenu() {
  const m=META[S.cat];
  document.getElementById('cat-title').textContent = m.t;
  document.getElementById('cat-desc').textContent  = m.d;
  const grid=document.getElementById('exgrid'); grid.innerHTML='';
  (CAT[S.cat]||[]).forEach(ex => {
    const rec=getRec(ex.id);
    const card=document.createElement('div'); card.className='excard';
    card.innerHTML=`<span class="ico">${ex.ico}</span><div class="nm">${ex.nm}</div><div class="ds">${ex.ds}</div>${rec!==null?`<div class="rec">🏆 Record : ${rec} pts</div>`:''}`;
    card.addEventListener('click', ()=>startGame(ex));
    grid.appendChild(card);
  });
}

// ════════════════════════════════════════
// START GAME
// ════════════════════════════════════════
function startGame(ex) {
  S.ex=ex;
  S.infinite = (S.nb===0); // infinite mode
  // Pre-generate questions. For infinite mode, generate a large batch and refill on demand.
  const batchSize = S.infinite ? 50 : S.nb;
  S.qs = genBatch(ex, batchSize);
  S.cur=0; S.score=0; S.points=0; S.streak=0; S.mult=1; S.done=false;

  show('play-screen');
  document.getElementById('ptitle').textContent=`${ex.ico} ${ex.nm}`;
  document.getElementById('streakBar').innerHTML='';
  document.getElementById('timerbox').style.display='none';

  stopQTimer();
  if(S.perQSec>0) {
    document.getElementById('qtimerWrap').style.display='block';
  } else {
    document.getElementById('qtimerWrap').style.display='none';
  }
  showQ();
}

// Generate a deduplicated batch of questions
function genBatch(ex, n) {
  const seen=new Set(), qs=[];
  let tries=0;
  while(qs.length<n && tries++<n*30) {
    try {
      const q=ex.gen();
      if(!q||!q.q||q.ans===undefined||!q.type) continue;
      const key=q.q.replace(/\s/g,'')+(q.clock?`_${q.clock.h}_${q.clock.m}`:'')+(q.shape||'');
      if(seen.has(key)) continue;
      seen.add(key); qs.push(q);
    } catch(e) {}
  }
  while(qs.length<n) qs.push(qs[R(0,Math.max(0,qs.length-1))]||{q:'2+2=?',ans:4,type:'mcq',choices:[3,4,5,6]});
  return qs;
}

// Per-question countdown timer
let _qTimerInt=null, _qTimerStart=null;

function startQTimer() {
  stopQTimer();
  if(!S.perQSec) return;
  _qTimerStart=Date.now();
  _qTimerInt=setInterval(tickQTimer, 50);
  tickQTimer(); // immediate first draw
}
function stopQTimer() {
  if(_qTimerInt){ clearInterval(_qTimerInt); _qTimerInt=null; }
}
function tickQTimer() {
  const elapsed=(Date.now()-_qTimerStart)/1000;
  const left=Math.max(0, S.perQSec-elapsed);
  const pct=(left/S.perQSec)*100;
  const bar=document.getElementById('qtimerBar');
  const lbl=document.getElementById('qtimerLbl');
  bar.style.width=pct+'%';
  const cls = pct<=20?'danger':pct<=40?'warn':'';
  bar.className='qtimer-bar'+(cls?' '+cls:'');
  lbl.className='qtimer-lbl'+(cls?' '+cls:'');
  lbl.textContent=Math.ceil(left)+'s';
  if(left<=0){
    stopQTimer();
    if(!S.done){
      S.done=true;
      // Show correct answer on all buttons then move on
      const grid=document.getElementById('qcard').querySelector('.mcqgrid');
      if(grid) {
        const ans=S.qs[S.cur]?.ans;
        grid.querySelectorAll('.mcqbtn').forEach(b=>{
          b.disabled=true;
          if(String(b.textContent)===String(ans)) b.classList.add('ok');
        });
      }
      onAnswer(false);
    }
  }
}

function stopTimer() { /* legacy no-op kept for compat */ }
function endByTime() {
  stopQTimer();
  if(!S.done){
    S.done=true;
    const grid=document.getElementById('qcard')?.querySelector('.mcqgrid');
    if(grid){
      const ans=S.qs[S.cur]?.ans;
      grid.querySelectorAll('.mcqbtn').forEach(b=>{
        b.disabled=true;
        if(String(b.textContent)===String(ans)) b.classList.add('ok');
      });
    }
    // Show time emoji feedback, then move to next question
    const fb=document.getElementById('fb'); fb.innerHTML='';
    fb.appendChild(mk('div','fbmsg','⏰'));
    setTimeout(()=>{ S.cur++; if(!S.infinite&&S.cur>=S.qs.length) showResults(); else showQ(); }, 1000);
  }
}

// ════════════════════════════════════════
// SHOW QUESTION
// ════════════════════════════════════════
function showQ() {
  // Infinite mode: refill batch when running low
  if(S.infinite && S.cur>=S.qs.length-3) {
    const extra=genBatch(S.ex, 20);
    S.qs=S.qs.concat(extra);
  }
  if(!S.infinite && S.cur>=S.qs.length){ showResults(); return; }
  S.done=false;
  const q=S.qs[S.cur], tot=S.qs.length;
  if(S.infinite){
    document.getElementById('progbar').style.width='0%';
    document.getElementById('proglbl').textContent=`Question ${S.cur+1}`;
  } else {
    document.getElementById('progbar').style.width=`${(S.cur/tot)*100}%`;
    document.getElementById('proglbl').textContent=`Question ${S.cur+1} / ${tot}`;
  }
  document.getElementById('scoreVal').textContent=S.points;
  renderStreak();

  const card=document.getElementById('qcard'); card.innerHTML='';
  card.appendChild(mk('div','qlabel',`Question ${S.cur+1}`));

  // Clock visual
  if(q.clock){
    const wrap=document.createElement('div');
    wrap.innerHTML=clockSVG(q.clock.h, q.clock.m);
    card.appendChild(wrap);
  }
  // Shape visual
  if(q.shape){
    const wrap=document.createElement('div');
    wrap.innerHTML=shapeSVG(q.shape);
    card.appendChild(wrap);
  }

  const txt=mk('div','qtext',q.q);
  if(q.q&&q.q.length>50) txt.classList.add('sm');
  card.appendChild(txt);

  buildMCQ(card, q);
  startQTimer();
}

function renderStreak() {
  const bar=document.getElementById('streakBar'); bar.innerHTML='';
  if(S.streak>=3){ const sb=mk('div','streak-badge',`🔥 ${S.streak} d'affilée !`); bar.appendChild(sb); }
  if(S.mult>1){ const mb=mk('div','mult-badge',`×${S.mult} points`); bar.appendChild(mb); }
}

// ════════════════════════════════════════
// BUILD MCQ (only answer type)
// ════════════════════════════════════════
function buildMCQ(card, q) {
  let choices = q.choices ? [...q.choices] : numChoices(q.ans);
  // ensure 4 choices
  if(choices.length<4 && typeof q.ans==='number') choices=numChoices(q.ans);
  // shuffle (but keep Oui/Non fixed for yes/no questions)
  const isYN = choices.length===2 && choices.every(c=>c==='Oui'||c==='Non');
  if(!isYN) choices=SH(choices);

  const isText = choices.some(c=>typeof c==='string'&&isNaN(Number(c)));
  const grid=mk('div','mcqgrid');

  choices.forEach(c => {
    const btn=mk('button','mcqbtn'+(isText?' sm':''), String(c));
    btn.addEventListener('click',()=>{
      if(S.done) return; S.done=true;
      const ok = String(c)===String(q.ans);
      btn.classList.add(ok?'ok':'ko');
      if(!ok){
        // Show correct answer
        grid.querySelectorAll('.mcqbtn').forEach(b=>{ if(String(b.textContent)===String(q.ans)) b.classList.add('ok'); });
        const hint=mk('div','wrong-hint',`✗ La réponse était : ${q.ans}`);
        card.appendChild(hint);
      }
      grid.querySelectorAll('.mcqbtn').forEach(b=>b.disabled=true);
      onAnswer(ok);
    });
    grid.appendChild(btn);
  });
  card.appendChild(grid);
}

// ════════════════════════════════════════
// ANSWER HANDLING
// ════════════════════════════════════════
function onAnswer(ok) {
  if(ok) {
    S.score++; S.streak++;
    if(S.streak>=10) S.mult=4;
    else if(S.streak>=6) S.mult=3;
    else if(S.streak>=3) S.mult=2;
    else S.mult=1;
    let pts=10*S.mult;
    if(S.perQSec>0&&_qTimerStart){ const rem=Math.max(0,S.perQSec-(Date.now()-_qTimerStart)/1000); pts+=Math.round((rem/S.perQSec)*5); }
    S.points+=pts;
    showBonusPop(`+${pts}`+(S.mult>1?` ×${S.mult}`:''));
    playOk();
  } else {
    S.streak=0; S.mult=1; playKo();
  }
  // Feedback
  stopQTimer();
  const fb=document.getElementById('fb'); fb.innerHTML='';
  fb.appendChild(mk('div','fbmsg', ok?P(['⭐','🎉','✨','🔥','💫','🌟']):'😢'));
  setTimeout(()=>{
    S.cur++;
    if(!S.infinite && S.cur>=S.qs.length) showResults();
    else showQ();
  }, 1000);
}

function showBonusPop(text) {
  const e=mk('div','bonus-pop',text);
  e.style.cssText=`top:42%;left:${R(28,62)}%;`;
  document.body.appendChild(e);
  setTimeout(()=>e.remove(),1000);
}

// ════════════════════════════════════════
// RESULTS
// ════════════════════════════════════════
function showResults() {
  stopTimer(); show('results-screen');
  const total=S.infinite?S.cur:S.qs.length; const pct=total>0?S.score/total:0;
  document.getElementById('remoji').textContent   = pct===1?'🏆':pct>=.8?'🌟':pct>=.6?'😊':'💪';
  document.getElementById('rtitle').textContent   = pct===1?'Parfait !':pct>=.8?'Excellent !':pct>=.6?'Bien joué !':'Continue !';
  document.getElementById('rsub').textContent     = pct===1?'Tout bon, champion(ne) !':pct>=.8?'Presque parfait !':pct>=.6?'Bon travail !':'Tu vas progresser !';
  document.getElementById('rbig').textContent     = S.infinite ? `${S.score} ✓` : `${S.score}/${S.qs.length}`;
  document.getElementById('rpoints').textContent  = S.points;
  const modeLabel = S.perQSec===15?'🚶 Normal':S.perQSec===10?'🏃 Rapide':S.perQSec===7?'⚡ Génie':'';
  document.getElementById('rtime').textContent = modeLabel ? `Mode : ${modeLabel}` : '';

  const rec=getRec(S.ex.id);
  const isNew=rec===null||S.points>rec;
  if(isNew) setRec(S.ex.id,S.points);
  const banner=document.getElementById('recordBanner');
  banner.style.display=isNew?'block':'none';
  if(isNew){ banner.textContent=rec===null?'🏆 Premier score enregistré !':'🏆 Nouveau record !'; playRec(); launchConfetti(); }
  document.getElementById('rboxRec').style.display='flex';
  document.getElementById('rrecord').textContent=`${isNew?S.points:rec} pts`;

  const stars=pct===1?3:pct>=.6?2:1;
  document.getElementById('starsrow').innerHTML=[0,1,2].map(i=>`<span style="opacity:${i<stars?1:.15}">${i<stars?'⭐':'☆'}</span>`).join('');
  if(!isNew&&pct>=.8) launchConfetti();
}

function launchConfetti() {
  const cols=['#fbbf24','#34d399','#22d3ee','#db2777','#a78bfa','#fb923c','#fff'];
  for(let i=0;i<80;i++){
    const e=mk('div','cf'); const sz=R(5,13);
    e.style.cssText=`left:${R(2,98)}%;top:0;background:${P(cols)};width:${sz}px;height:${sz}px;border-radius:${Math.random()<.5?'50%':'2px'};--d:${R(1400,3000)}ms;--dl:${R(0,800)}ms`;
    document.body.appendChild(e); setTimeout(()=>e.remove(),3800);
  }
}
